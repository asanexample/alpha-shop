# prod resource bump (real per-stage delta): higher requests/limits for production load.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: app-alpha-shop
spec:
  template:
    spec:
      containers:
        - name: app-alpha-shop
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
