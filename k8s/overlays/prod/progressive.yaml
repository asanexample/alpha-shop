# Prod canary extra (ADR-056): the canary Service targets the new-revision pods (Argo Rollouts injects the
# rollouts-pod-template-hash). The base Service is the stable service; the HTTPRoute is patched to a weighted
# stable+canary pair (kustomization.yaml) and the Gateway-API plugin shifts the weights per step.
apiVersion: v1
kind: Service
metadata:
  name: app-alpha-shop-canary
spec:
  type: ClusterIP
  selector:
    app: app-alpha-shop
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
---
# Metric gate (ADR-056 W8c): the canary's background analysis queries the hub Mimir (via the preprod spoke read
# route) for the app's HTTP success rate and auto-rolls-back if it misses. Prometheus provider (not job — Kyverno
# would deny a non-team-ECR job image). The hub force-sets the X-Scope-OrgID tenant, so no header is needed.
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: app-alpha-shop-canary-gate
spec:
  args:
    - name: namespace
  metrics:
    - name: success-rate
      interval: 30s
      failureLimit: 1
      provider:
        prometheus:
          address: https://preprod-mimir.aws.refplat.org/prometheus
          query: |
            sum(rate(http_server_request_duration_seconds_count{k8s_namespace_name="{{args.namespace}}",http_response_status_code!~"5.."}[2m]))
            / sum(rate(http_server_request_duration_seconds_count{k8s_namespace_name="{{args.namespace}}"}[2m]))
      successCondition: "len(result) == 0 || result[0] >= 0.95"
---
# W11 error-budget freeze DEMO. The `(... or vector(0)) + 5` SIMULATES the service burning ~5x its budget (the
# real burn rate is ~0 — the service is healthy); the threshold (< 2) is the REAL freeze logic. So this fires the
# freeze on a healthy service to demonstrate it. Remove the `+ 5` to restore the genuine gate.
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: app-alpha-shop-budget-freeze
spec:
  args:
    - name: namespace
  metrics:
    - name: error-budget-burn
      count: 1
      provider:
        prometheus:
          address: https://preprod-mimir.aws.refplat.org/prometheus
          query: |
            (slo:current_burn_rate:ratio{sloth_id="{{args.namespace}}-availability"} or vector(0)) + 5
      successCondition: "result[0] < 2"
