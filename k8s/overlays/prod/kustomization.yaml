# prod. Three replicas per service + a resource bump. The user-facing STOREFRONT runs a stepped, metric-gated
# canary (ADR-056): its base Rollout strategy is replaced with a weighted Gateway-API canary. The internal
# catalog keeps the base auto-promote strategy (no user traffic to shift). The Application ignoreDifferences
# (argocd-apps) lets the Gateway-API plugin own the storefront weights.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - progressive.yaml
replicas:
  - name: storefront
    count: 3
  - name: catalog
    count: 3
  - name: cart
    count: 3
  - name: orders
    count: 3
  - name: payment
    count: 3
  - name: checkout
    count: 3
patches:
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: storefront
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: storefront
    patch: |-
      - op: replace
        path: /spec/strategy
        value:
          canary:
            stableService: storefront
            canaryService: storefront-canary
            trafficRouting:
              plugins:
                argoproj-labs/gatewayAPI:
                  httpRoute: storefront
            maxSurge: 1
            maxUnavailable: 0
            # Metric gate (W8c): background AnalysisRun over the whole canary — auto-rollback on a bad version.
            analysis:
              templates:
                - templateName: storefront-canary-gate
              args:
                - name: namespace
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
            steps:
              # W11 error-budget freeze — pre-flight, before any traffic shifts.
              - analysis:
                  templates:
                    - templateName: storefront-budget-freeze
                  args:
                    - name: namespace
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.namespace
              - setWeight: 25
              - pause: { duration: 60 }
              - setWeight: 50
              - pause: { duration: 60 }
              - setWeight: 100
  - target:
      group: gateway.networking.k8s.io
      version: v1
      kind: HTTPRoute
      name: storefront
    patch: |-
      - op: replace
        path: /spec/rules/0/backendRefs
        value:
          - name: storefront
            port: 80
            weight: 100
          - name: storefront-canary
            port: 80
            weight: 0
images:
  - name: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-alpha/shop-storefront
    newTag: placeholder
  - name: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-alpha/shop-catalog
    newTag: placeholder
  - name: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-alpha/shop-cart
    newTag: placeholder
  - name: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-alpha/shop-orders
    newTag: placeholder
  - name: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-alpha/shop-payment
    newTag: placeholder
  - name: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-alpha/shop-checkout
    newTag: placeholder
