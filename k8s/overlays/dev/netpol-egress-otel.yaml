# Allow egress from this shop service to the platform OTLP collector (observability/otel-collector:4318)
# so the OpenTelemetry SDK can export request traces to Tempo — the half that makes log → trace work.
#
# Environment namespaces default-deny EGRESS (the Composition's allow-dns-egress selects all pods with
# policyTypes: Egress). NetworkPolicies are additive, so this unions an egress allow to the collector on
# top of DNS/world/checkout. Cilium honours the namespaceSelector for cross-namespace pod-to-pod egress
# (an ipBlock would NOT — see the checkout netpol). The collector's namespace isn't Composition-managed,
# so no default-deny ingress there to pair against — the egress half alone opens the path.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-otel-collector
spec:
  podSelector: {}
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - port: 4318
          protocol: TCP
