# Allow egress from this shop service to alpha-checkout (alpha-checkout-dev).
#
# Environment namespaces default-deny EGRESS too (the Composition stamps allow-dns-egress with
# policyTypes: Egress, which selects all pods → default-deny except DNS + the 0.0.0.0/0 ipBlock).
# A k8s NetworkPolicy ipBlock does NOT cover in-cluster pod identities in Cilium, so pod-to-pod
# egress to another namespace needs an identity/namespace-based allow. NetworkPolicies are additive,
# so this unions an egress allow to checkout on top of the DNS/world allow. Paired with checkout's
# ingress allow (allow-ingress-from-alpha-shop) — cross-namespace needs BOTH halves.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-alpha-checkout
spec:
  podSelector: {}
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              platform.refplat.org/team: alpha
              platform.refplat.org/product: checkout
              platform.refplat.org/stage: dev
      ports:
        - port: 8080
          protocol: TCP
