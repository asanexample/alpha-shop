# dev (the default stage). Single replica. The image is NOT pinned here (ADR-071): the per-Product
# ApplicationSet injects the deployed digest from the control-plane Release record
# (gitops/releases/<team>/<product>/dev.yaml). CI never writes this repo's main; `placeholder` stays.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
replicas:
  - name: app-alpha-shop
    count: 1
images:
  - name: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-alpha/shop-web
    newTag: placeholder # the ApplicationSet injects the real digest from the Release record (ADR-071)

# TEMP — ADR-084 Phase 1 demo: force a crash-on-start so the triage agent attributes the incident to this
# commit's author. REVERTED immediately after the demo (do not keep).
patches:
  - target:
      kind: Rollout
      name: app-alpha-shop
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/command
        value: ["/bin/sh", "-c", "echo 'FATAL: missing DATABASE_URL after config change'; sleep 5; exit 1"]
