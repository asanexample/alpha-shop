# dev (the default stage). Single replica per service to save cost. Images are NOT pinned here (ADR-071): the
# per-Product ApplicationSet injects each service's deployed digest from the control-plane Release record
# (gitops/releases/alpha/shop/dev.yaml). CI never writes this repo's main; `placeholder` stays.
# The shared otel/pyroscope egress netpols now live in base (stage-agnostic).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - progressive.yaml # storefront canary Service + metric-gate AnalysisTemplate (ADR-056 demo)
  - hpa.yaml # storefront CPU HPA (ADR-078 autoscaling); AppProject permits HPA since platform#1342 (applied)
replicas:
  # storefront runs 2 so the canary has a real stable+canary split (and to satisfy the drain floor).
  - name: storefront
    count: 2
  - name: catalog
    count: 1
  - name: cart
    count: 1
  - name: orders
    count: 1
  - name: payment
    count: 1
  - name: checkout
    count: 1
  - name: accounts
    count: 1
images:
  - name: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-alpha/shop-storefront
    newTag: placeholder # the ApplicationSet injects the real digest from the Release record (ADR-071)
  - name: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-alpha/shop-catalog
    newTag: placeholder
  - name: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-alpha/shop-cart
    newTag: placeholder
  - name: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-alpha/shop-orders
    newTag: placeholder
  - name: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-alpha/shop-payment
    newTag: placeholder
  - name: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-alpha/shop-checkout
    newTag: placeholder
  - name: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-alpha/shop-accounts
    newTag: placeholder
patches:
  # Replace the storefront's base strategy (setWeight 100 = instant) with a stepped, metric-gated Gateway-API
  # canary — the dev showcase of ADR-056. Demo-tuned pauses (30s) so a rollout steps through visibly. The
  # internal services keep the base auto-promote strategy (no user traffic to shift).
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Rollout
      name: storefront
    patch: |-
      - op: replace
        path: /spec/strategy
        value:
          canary:
            stableService: storefront
            canaryService: storefront-canary
            trafficRouting:
              plugins:
                argoproj-labs/gatewayAPI:
                  httpRoute: storefront
            maxSurge: 1
            maxUnavailable: 0
            analysis:
              templates:
                - templateName: storefront-canary-gate
              args:
                - name: namespace
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
            steps:
              - setWeight: 20
              - pause: { duration: 30 }
              - setWeight: 50
              - pause: { duration: 30 }
              - setWeight: 100
  # Split the storefront HTTPRoute into a weighted stable+canary pair; the Gateway-API plugin shifts the weights
  # per step (git holds the at-rest 100/0, restored between rollouts).
  - target:
      group: gateway.networking.k8s.io
      version: v1
      kind: HTTPRoute
      name: storefront
    patch: |-
      - op: replace
        path: /spec/rules/0/backendRefs
        value:
          - name: storefront
            port: 80
            weight: 100
          - name: storefront-canary
            port: 80
            weight: 0
