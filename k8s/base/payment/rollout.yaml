# payment — internal mock payment authorizer (ClusterIP, no HTTPRoute). Called east-west by orders during
# checkout. No state, no AWS — so it keeps the shared app-alpha SA (no self-service resources ⇒ no per-service
# Pod Identity needed). Instrumented so the authorization is a distinct span in the checkout trace.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: payment
  labels:
    app: payment
    app.kubernetes.io/name: shop-payment
    team: alpha
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment
  strategy:
    canary:
      maxSurge: 1
      maxUnavailable: 0
      steps:
        - setWeight: 100
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-sdk: "platform"
      labels:
        app: payment
        app.kubernetes.io/name: shop-payment
        team: alpha
    spec:
      serviceAccountName: app-alpha
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          matchLabelKeys: [rollouts-pod-template-hash]
          labelSelector:
            matchLabels:
              app: payment
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          matchLabelKeys: [rollouts-pod-template-hash]
          labelSelector:
            matchLabels:
              app: payment
      containers:
        - name: payment
          image: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-alpha/shop-payment:placeholder
          ports:
            - containerPort: 8080
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OTEL_SERVICE_NAME
              value: shop-payment
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.namespace=alpha-shop
            - name: PYROSCOPE_SERVER_ADDRESS
              value: https://preprod-profiles.aws.refplat.org
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
