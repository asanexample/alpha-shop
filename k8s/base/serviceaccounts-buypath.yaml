# Per-service ServiceAccounts for the buy-path services that use self-service AWS resources. EKS Pod Identity
# binds ONE role per (namespace, serviceAccount), so a service that declares `resources` needs its OWN SA — the
# Composition mints Pod-alpha-shop-<stage>-cart / -orders roles with the derived least-privilege DynamoDB/SQS
# IAM and associates them here. No eks.amazonaws.com/role-arn annotation (that's IRSA — denied by policy).
# (storefront/catalog/payment have no resources, so they share app-alpha in serviceaccount.yaml.)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-alpha-cart
  labels:
    app.kubernetes.io/name: app-alpha-cart
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-alpha-orders
  labels:
    app.kubernetes.io/name: app-alpha-orders
