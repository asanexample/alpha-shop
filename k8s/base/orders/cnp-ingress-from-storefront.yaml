# East-west ingress: orders accepts traffic from the storefront (BFF, its own order-status lookup route) AND
# checkout (places the order during the buy path), port 8080, SPIRE mutual auth required (ADR-057) for both
# callers. Additive allow over the environment default-deny ingress. The caller halves are
# storefront/cnp-egress-eastwest.yaml and checkout/cnp-egress-to-cart-and-orders.yaml.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-orders-ingress-from-storefront
spec:
  endpointSelector:
    matchLabels:
      app: orders
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: storefront
        - matchLabels:
            app: checkout
      authentication:
        mode: required
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
