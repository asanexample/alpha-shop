# orders — internal orders service (ClusterIP, no HTTPRoute). Orchestrates checkout: authorizes payment
# east-west (PAYMENT_URL), persists to the self-service DynamoDB table (ORDERS_TABLE) and emits an order-placed
# event to the self-service SQS queue (EVENTS_QUEUE_URL) — both from the orders-resources ConfigMap (ADR-073).
# AWS creds via Pod Identity on the app-alpha-orders SA; AWS_REGION explicit (IMDS blocked).
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: orders
  labels:
    app: orders
    app.kubernetes.io/name: shop-orders
    team: alpha
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders
  strategy:
    canary:
      maxSurge: 1
      maxUnavailable: 0
      steps:
        - setWeight: 100
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-sdk: "platform"
      labels:
        app: orders
        app.kubernetes.io/name: shop-orders
        team: alpha
    spec:
      serviceAccountName: app-alpha-orders
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          matchLabelKeys: [rollouts-pod-template-hash]
          labelSelector:
            matchLabels:
              app: orders
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          matchLabelKeys: [rollouts-pod-template-hash]
          labelSelector:
            matchLabels:
              app: orders
      containers:
        - name: orders
          image: 829808296602.dkr.ecr.us-east-1.amazonaws.com/team-alpha/shop-orders:placeholder
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: orders-resources
                optional: true
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: AWS_REGION
              value: us-east-1
            - name: PAYMENT_URL
              value: http://payment
            - name: OTEL_SERVICE_NAME
              value: shop-orders
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.namespace=alpha-shop
            - name: PYROSCOPE_SERVER_ADDRESS
              value: https://preprod-profiles.aws.refplat.org
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
