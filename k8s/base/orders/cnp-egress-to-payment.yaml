# East-west egress: orders → payment (same namespace, port 8080), plus DNS to resolve the payment Service.
# The environment default-denies egress; in-cluster pod-to-pod is Cilium identity-matched, so the broad
# 0.0.0.0/0 egress (used for AWS APIs) does NOT cover it — this specific allow is required. The callee half +
# SPIRE mutual auth is payment/cnp-ingress-from-orders.yaml.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-orders-egress-to-payment
spec:
  endpointSelector:
    matchLabels:
      app: orders
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toEndpoints:
        - matchLabels:
            app: payment
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
