apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: storefront
spec:
  parentRefs:
    - name: preprod-gateway
      namespace: default
      sectionName: https
  # Placeholder only — the per-Product ApplicationSet patches /spec/hostnames/0 to the real host
  # (shop-alpha-dev.preprod.aws.refplat.org). storefront is the ONLY service with an HTTPRoute (catalog is
  # internal), so that unqualified HTTPRoute host-patch is unambiguous. `.invalid` fails safe.
  hostnames:
    - placeholder.invalid
  rules:
    - backendRefs:
        - name: storefront
          port: 80
