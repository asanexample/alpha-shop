# East-west egress from the storefront BFF to the internal services it aggregates: catalog (browse), cart and
# orders (their own CRUD/lookup passthrough routes), checkout (the buy-path orchestrator, ADR-057 — cart/
# orders are still called directly here for storefront's own routes, not as part of checkout), and accounts
# (signup/login/logout/verify). Same namespace, port 8080. The environment default-denies egress and
# in-cluster pod-to-pod is Cilium identity-matched (the broad 0.0.0.0/0 egress used for AWS does NOT cover
# pods), so these specific allows are required. DNS to CoreDNS resolves the Service names. Each callee
# enforces the SPIRE mutual-auth ingress half (cart/orders/catalog/checkout/accounts
# cnp-ingress-from-storefront.yaml).
#
# Plus a CROSS-namespace hop to the platform flagship service (ADR-099): the in-process flagd syncer polls
# GET /sync/alpha/shop/dev on flagship-server:8080 in the platform-flagship-dev namespace. Same identity-match
# rule — the namespace MUST be named (a bare app: label defaults to this namespace). flagship admits us via its
# allow-sync-from-shop ingress CNP.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-storefront-egress-eastwest
spec:
  endpointSelector:
    matchLabels:
      app: storefront
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toEndpoints:
        - matchLabels:
            app: catalog
        - matchLabels:
            app: cart
        - matchLabels:
            app: orders
        - matchLabels:
            app: checkout
        - matchLabels:
            app: accounts
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: platform-flagship-dev
            app: flagship-server
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
