# East-west ingress: cart accepts traffic ONLY from the storefront (BFF), port 8080, with Cilium mutual
# authentication REQUIRED (ADR-057 SPIRE mTLS). The environment default-denies ingress; this is the additive
# allow. The caller half is storefront/cnp-egress-eastwest.yaml.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cart-ingress-from-storefront
spec:
  endpointSelector:
    matchLabels:
      app: cart
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: storefront
      authentication:
        mode: required
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
