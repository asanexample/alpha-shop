# East-west ingress: checkout accepts traffic ONLY from the storefront (BFF), port 8080, SPIRE mutual auth
# required (ADR-057). Additive allow over the environment default-deny ingress.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-checkout-ingress-from-storefront
spec:
  endpointSelector:
    matchLabels:
      app: checkout
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: storefront
      authentication:
        mode: required
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
