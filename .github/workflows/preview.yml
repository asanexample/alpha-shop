name: PR Preview

# Thin caller (same shared build-sign + slsa-provenance siblings as deploy.yml, but no deploy/promote job).
# Builds + signs + provenances a PR image PER SERVICE so previews satisfy the same Kyverno verify-images /
# verify-attestations checks. alpha's Environment claim has preview: true; per-PR preview delivery on the v3
# model is a separate enhancement, so these are built for parity. Fork PRs get no OIDC token, so they fail
# closed (cannot push) — by design.

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  id-token: write
  contents: read

jobs:
  build-storefront:
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/build-sign.yml@7a739dcd25cff26ac7c33f2301166a1c34301b6c
    with:
      app: shop-storefront
      product: shop
      tag: ${{ github.event.pull_request.head.sha }}
      dockerfile: services/storefront/Dockerfile

  provenance-storefront:
    needs: build-storefront
    if: github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.fork != true
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/slsa-provenance.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      image: ${{ needs.build-storefront.outputs.image }}
      digest: ${{ needs.build-storefront.outputs.digest }}
      product: shop

  build-catalog:
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/build-sign.yml@7a739dcd25cff26ac7c33f2301166a1c34301b6c
    with:
      app: shop-catalog
      product: shop
      tag: ${{ github.event.pull_request.head.sha }}
      dockerfile: services/catalog/Dockerfile

  provenance-catalog:
    needs: build-catalog
    if: github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.fork != true
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/slsa-provenance.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      image: ${{ needs.build-catalog.outputs.image }}
      digest: ${{ needs.build-catalog.outputs.digest }}
      product: shop
