name: PR Preview

# Thin caller (same shared build-sign + slsa-provenance siblings as deploy.yml, but no deploy/commit job).
# Builds + signs + provenances a PR image so previews satisfy the same Kyverno verify-images /
# verify-attestations checks. alpha's Environment claim has preview: false today, so there is no preview
# ApplicationSet deploying these images yet — they are built for parity and activate when the claim flips
# preview: true. Fork PRs get no OIDC token, so they fail closed (cannot push) — by design.

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    permissions:
      id-token: write
      contents: read
    uses: asanexample/trusted-ci/.github/workflows/build-sign.yml@7a739dcd25cff26ac7c33f2301166a1c34301b6c
    with:
      app: shop-web # product-scoped image team-alpha/shop-web (v3); PR-preview delivery is a separate enhancement
      product: shop # selects the per-Product OIDC role github-actions-ecr-push-product-alpha-shop (ADR-069) — required input
      tag: ${{ github.event.pull_request.head.sha }}

  provenance:
    needs: build
    permissions:
      id-token: write
      contents: read
    uses: asanexample/trusted-ci/.github/workflows/slsa-provenance.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      image: ${{ needs.build.outputs.image }}
      digest: ${{ needs.build.outputs.digest }}
      product: shop # selects the per-Product OIDC role github-actions-ecr-push-product-alpha-shop (ADR-069) — required input
