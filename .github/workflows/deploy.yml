name: Deploy

# Thin caller (ADR-067 / ADR-071). The supply-chain backbone lives in the app-team-unwritable
# asanexample/trusted-ci repo. One build→provenance→promote chain PER SERVICE (the bike shop is one Product
# with many services): each builds its own image (team-alpha/shop-<service>) from its own Dockerfile, signs +
# SBOMs + provenances it, then records the digest in the platform control-plane Release
# (gitops/releases/alpha/shop/dev.yaml, keyed by service). THIS repo's main is NEVER written by CI (no
# contents:write). Both services rebuild on any code/Dockerfile/dep change (a shared internal/ change can
# affect both); manifest/docs-only pushes skip via paths-ignore.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'docs/**'
      - '**/*.md'

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------- storefront (edge: SPA + BFF) ----------------
  build-storefront:
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/build-sign.yml@7a739dcd25cff26ac7c33f2301166a1c34301b6c
    with:
      app: shop-storefront
      product: shop
      tag: ${{ github.sha }}
      dockerfile: services/storefront/Dockerfile

  provenance-storefront:
    needs: build-storefront
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/slsa-provenance.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      image: ${{ needs.build-storefront.outputs.image }}
      digest: ${{ needs.build-storefront.outputs.digest }}
      product: shop

  promote-storefront:
    needs: [build-storefront, provenance-storefront]
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/promote.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      product: shop
      service: storefront
      stage: dev
      digest: ${{ needs.build-storefront.outputs.digest }}

  # ---------------- catalog (internal) ----------------
  build-catalog:
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/build-sign.yml@7a739dcd25cff26ac7c33f2301166a1c34301b6c
    with:
      app: shop-catalog
      product: shop
      tag: ${{ github.sha }}
      dockerfile: services/catalog/Dockerfile

  provenance-catalog:
    needs: build-catalog
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/slsa-provenance.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      image: ${{ needs.build-catalog.outputs.image }}
      digest: ${{ needs.build-catalog.outputs.digest }}
      product: shop

  promote-catalog:
    needs: [build-catalog, provenance-catalog]
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/promote.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      product: shop
      service: catalog
      stage: dev
      digest: ${{ needs.build-catalog.outputs.digest }}

  # ---------------- cart (internal, buy path) ----------------
  build-cart:
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/build-sign.yml@7a739dcd25cff26ac7c33f2301166a1c34301b6c
    with:
      app: shop-cart
      product: shop
      tag: ${{ github.sha }}
      dockerfile: services/cart/Dockerfile

  provenance-cart:
    needs: build-cart
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/slsa-provenance.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      image: ${{ needs.build-cart.outputs.image }}
      digest: ${{ needs.build-cart.outputs.digest }}
      product: shop

  promote-cart:
    needs: [build-cart, provenance-cart]
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/promote.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      product: shop
      service: cart
      stage: dev
      digest: ${{ needs.build-cart.outputs.digest }}

  # ---------------- orders (internal, buy path) ----------------
  build-orders:
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/build-sign.yml@7a739dcd25cff26ac7c33f2301166a1c34301b6c
    with:
      app: shop-orders
      product: shop
      tag: ${{ github.sha }}
      dockerfile: services/orders/Dockerfile

  provenance-orders:
    needs: build-orders
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/slsa-provenance.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      image: ${{ needs.build-orders.outputs.image }}
      digest: ${{ needs.build-orders.outputs.digest }}
      product: shop

  promote-orders:
    needs: [build-orders, provenance-orders]
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/promote.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      product: shop
      service: orders
      stage: dev
      digest: ${{ needs.build-orders.outputs.digest }}

  # ---------------- payment (internal, buy path) ----------------
  build-payment:
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/build-sign.yml@7a739dcd25cff26ac7c33f2301166a1c34301b6c
    with:
      app: shop-payment
      product: shop
      tag: ${{ github.sha }}
      dockerfile: services/payment/Dockerfile

  provenance-payment:
    needs: build-payment
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/slsa-provenance.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      image: ${{ needs.build-payment.outputs.image }}
      digest: ${{ needs.build-payment.outputs.digest }}
      product: shop

  promote-payment:
    needs: [build-payment, provenance-payment]
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/promote.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      product: shop
      service: payment
      stage: dev
      digest: ${{ needs.build-payment.outputs.digest }}

  # ---------------- checkout (internal, buy path orchestrator) ----------------
  build-checkout:
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/build-sign.yml@7a739dcd25cff26ac7c33f2301166a1c34301b6c
    with:
      app: shop-checkout
      product: shop
      tag: ${{ github.sha }}
      dockerfile: services/checkout/Dockerfile

  provenance-checkout:
    needs: build-checkout
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/slsa-provenance.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      image: ${{ needs.build-checkout.outputs.image }}
      digest: ${{ needs.build-checkout.outputs.digest }}
      product: shop

  promote-checkout:
    needs: [build-checkout, provenance-checkout]
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/promote.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      product: shop
      service: checkout
      stage: dev
      digest: ${{ needs.build-checkout.outputs.digest }}

  # ---------------- accounts (internal, identity) ----------------
  build-accounts:
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/build-sign.yml@7a739dcd25cff26ac7c33f2301166a1c34301b6c
    with:
      app: shop-accounts
      product: shop
      tag: ${{ github.sha }}
      dockerfile: services/accounts/Dockerfile

  provenance-accounts:
    needs: build-accounts
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/slsa-provenance.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      image: ${{ needs.build-accounts.outputs.image }}
      digest: ${{ needs.build-accounts.outputs.digest }}
      product: shop

  promote-accounts:
    needs: [build-accounts, provenance-accounts]
    permissions: { id-token: write, contents: read }
    uses: asanexample/trusted-ci/.github/workflows/promote.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      product: shop
      service: accounts
      stage: dev
      digest: ${{ needs.build-accounts.outputs.digest }}
